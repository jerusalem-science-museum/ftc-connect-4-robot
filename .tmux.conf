setw -g mode-keys vi
set -g allow-passthrough on

# Prefix: Ctrl-a (screen-style, easier than Ctrl-b)
unbind C-b
set -g prefix C-Space
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits that open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vi mode for copy mode
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Quality of life
set -g mouse on
unbind-key -n MouseDown3Pane
bind-key -n MouseDown3Pane paste-buffer
set -g history-limit 10000
set -s escape-time 0          # No delay for Escape (crucial for Neovim)
set -g base-index 1           # Windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on    # Re-number on close
set -g focus-events on        # Needed for Neovim autoread

# 256 color + true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# System clipboard (requires xclip or xsel on Linux)
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
